<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ultimate Game Hub</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap');

body {
    margin: 0;
    background: black;
    color: white;
    font-family: 'Poppins', sans-serif;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

header {
    text-align: center;
    font-size: clamp(28px, 8vw, 50px);
    padding: 20px 10px;
    text-shadow: 0 0 10px cyan;
}

nav {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 20px;
    padding: 0 10px;
}

nav button {
    padding: 12px 20px;
    font-size: clamp(14px, 4vw, 18px);
    font-weight: bold;
    border: none;
    border-radius: 12px;
    background: #00ffff;
    color: black;
    cursor: pointer;
    transition: transform 0.2s, background 0.2s;
}

nav button:active {
    transform: scale(0.95);
}

#game-container {
    width: 100%;
    display: flex;
    justify-content: center;
    padding: 10px;
    box-sizing: border-box;
}

.gamePopup {
    background: rgba(0, 0, 0, 0.9);
    border: 2px solid cyan;
    padding: 20px;
    border-radius: 20px;
    display: none;
    text-align: center;
    box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
    width: 95%;
    max-width: 450px;
}

.show { display: block; }

/* TIC TAC TOE MOBILE FIX */
.board {
    display: grid;
    grid-template-columns: repeat(3, min(100px, 28vw));
    grid-template-rows: repeat(3, min(100px, 28vw));
    gap: 8px;
    justify-content: center;
    margin: 15px auto;
}

.cell {
    background: #111;
    border: 1px solid #333;
    font-size: clamp(30px, 10vw, 45px);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}

/* MEMORY MOBILE FIX */
.memoryGrid {
    display: grid;
    grid-template-columns: repeat(4, min(75px, 20vw));
    grid-template-rows: repeat(4, min(75px, 20vw));
    gap: 8px;
    justify-content: center;
    margin-top: 15px;
}

.card {
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(20px, 6vw, 30px);
    cursor: pointer;
    border: 1px solid #333;
    border-radius: 8px;
}

.timer {
    font-size: clamp(30px, 8vw, 40px);
    color: #00ff9f;
    font-family: monospace;
    margin: 10px 0;
}

.light {
    width: clamp(40px, 12vw, 55px);
    height: clamp(40px, 12vw, 55px);
    border-radius: 50%;
    background: #400;
    margin: 5px;
    display: inline-block;
}

.light.on { background: red; box-shadow: 0 0 15px red; }
.light.go { background: #00ff9f; box-shadow: 0 0 15px #00ff9f; }

select, button.reset-btn {
    padding: 10px 20px;
    border-radius: 8px;
    margin-top: 15px;
    cursor: pointer;
    background: white;
    font-weight: bold;
    border: none;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<header>🔥 Game Hub</header>

<nav>
    <button onclick="openGame('tic')">Tic Tac Toe</button>
    <button onclick="openGame('memory')">Memory</button>
    <button onclick="openGame('reaction')">Reaction</button>
</nav>

<div id="game-container">
    <!-- TIC TAC TOE -->
    <div id="tic" class="gamePopup">
        <h2>Tic Tac Toe</h2>
        <select id="mode">
            <option value="cpu">vs AI (Unbeatable)</option>
            <option value="pvp">Local PvP</option>
        </select>
        <div class="board" id="board"></div>
        <p id="status"></p>
        <button class="reset-btn" onclick="resetGame()">Reset</button>
    </div>

    <!-- MEMORY -->
    <div id="memory" class="gamePopup">
        <h2>Memory</h2>
        <div class="timer" id="memTimer">0.000s</div>
        <div class="memoryGrid" id="memGrid"></div>
        <button class="reset-btn" onclick="initMemory()">New Game</button>
    </div>

    <!-- REACTION -->
    <div id="reaction" class="gamePopup">
        <h2>Reaction Test</h2>
        <p style="font-size: 14px;">Wait for Green, then tap!</p>
        <div id="lights"></div>
        <div class="timer" id="timer">0.000s</div>
        <button class="reset-btn" onclick="startReaction()">Start</button>
    </div>
</div>

<script>
function openGame(id){
    document.querySelectorAll('.gamePopup').forEach(g=>g.classList.remove('show'));
    document.getElementById(id).classList.add('show');
    if(id==='memory') initMemory();
    if(id==='tic') draw();
}

/* 🎉 CONFETTI */
function confetti(){
    for(let i=0;i<60;i++){
        let d=document.createElement('div');
        d.style.position='fixed';
        d.style.width='6px';
        d.style.height='6px';
        d.style.background=`hsl(${Math.random()*360},100%,50%)`;
        d.style.top='50%'; d.style.left='50%';
        d.style.zIndex='100';
        document.body.appendChild(d);
        let x=(Math.random()-0.5)*window.innerWidth;
        let y=(Math.random()-0.5)*window.innerHeight;
        d.animate([{transform:'translate(0,0)'},{transform:`translate(${x}px,${y}px)`}],{duration:1000});
        setTimeout(()=>d.remove(),1000);
    }
}

/* TIC TAC TOE LOGIC */
let boardArr=["","","","","","","","",""];
let current="X", gameOver=false;
const wins=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
const board = document.getElementById("board");
const statusText = document.getElementById("status");
const mode = document.getElementById("mode");

function draw(){
    board.innerHTML="";
    boardArr.forEach((v,i)=>{
        let d=document.createElement("div");
        d.className="cell";
        d.innerText=v;
        d.onclick=()=>move(i);
        board.appendChild(d);
    });
}

function move(i){
    if(boardArr[i]||gameOver) return;
    if(mode.value==="cpu" && current==="O") return;

    boardArr[i]=current;
    draw();
    if(checkWin()) return;

    if(mode.value==="cpu"){
        current="O";
        setTimeout(aiMove,300);
    }else current=current==="X"?"O":"X";
}

function aiMove(){
    let best=-Infinity, movePos;
    for(let i=0;i<9;i++){
        if(!boardArr[i]){
            boardArr[i]="O";
            let score=minimax(boardArr,0,false);
            boardArr[i]="";
            if(score>best){best=score; movePos=i;}
        }
    }
    boardArr[movePos]="O";
    draw();
    if(!checkWin()) current="X";
}

function minimax(b, depth, isMax){
    let res=evaluate(b);
    if(res!==null) return res;
    if(isMax){
        let best=-Infinity;
        for(let i=0;i<9;i++){
            if(!b[i]){
                b[i]="O";
                best=Math.max(best,minimax(b,depth+1,false));
                b[i]="";
            }
        }
        return best;
    } else {
        let best=Infinity;
        for(let i=0;i<9;i++){
            if(!b[i]){
                b[i]="X";
                best=Math.min(best,minimax(b,depth+1,true));
                b[i]="";
            }
        }
        return best;
    }
}

function evaluate(b){
    for(let w of wins){
        let[a,c,d]=w;
        if(b[a]&&b[a]==b[c]&&b[a]==b[d]){
            return b[a]=="O"?10:-10;
        }
    }
    if(b.every(x=>x)) return 0;
    return null;
}

function checkWin(){
    for(let w of wins){
        let[a,b,c]=w;
        if(boardArr[a]&&boardArr[a]==boardArr[b]&&boardArr[a]==boardArr[c]){
            statusText.innerText=boardArr[a]+" Wins!";
            confetti();
            gameOver=true;
            return true;
        }
    }
    if(boardArr.every(x=>x)){
        statusText.innerText="Draw!";
        gameOver=true;
        return true;
    }
    return false;
}

function resetGame(){
    boardArr=["","","","","","","","",""];
    current="X"; gameOver=false; statusText.innerText="";
    draw();
}

/* MEMORY LOGIC */
let memSymbols=["🍎","🍌","🍇","🍒","🍍","🥝","🍉","🍑"];
let memArr=[],first=null,lock=false;
let timerInterval,startTime,started=false;
const memTimer = document.getElementById("memTimer");
const memGrid = document.getElementById("memGrid");

function initMemory(){
    clearInterval(timerInterval);
    memTimer.innerText="0.000s";
    started=false;
    memGrid.innerHTML="";
    memArr=[...memSymbols,...memSymbols].sort(()=>Math.random()-0.5);
    first=null; lock=false;
    memArr.forEach(sym=>{
        let c=document.createElement("div");
        c.className="card";
        c.dataset.val=sym;
        c.onclick=()=>flip(c);
        memGrid.appendChild(c);
    });
}

function flip(c){
    if(lock||c.innerText) return;
    if(!started){
        started=true;
        startTime=performance.now();
        timerInterval=setInterval(()=>{
            memTimer.innerText=((performance.now()-startTime)/1000).toFixed(3)+"s";
        },50);
    }
    c.innerText=c.dataset.val;
    if(!first) first=c;
    else{
        if(first.dataset.val===c.dataset.val){
            first=null;
            if([...memGrid.children].every(x=>x.innerText)){
                clearInterval(timerInterval);
                confetti();
            }
        }else{
            lock=true;
            setTimeout(()=>{
                c.innerText=""; first.innerText="";
                first=null; lock=false;
            },600);
        }
    }
}

/* REACTION LOGIC */
let lightsDiv=document.getElementById("lights"),lights=[];
const rTimer = document.getElementById("timer");
let reactionStart, reactionInterval, isWaiting = false;

function createLights(){
    lightsDiv.innerHTML="";
    lights=[];
    for(let i=0;i<5;i++){
        let l=document.createElement("div");
        l.className="light";
        lightsDiv.appendChild(l);
        lights.push(l);
    }
}

function startReaction(){
    createLights();
    rTimer.innerText="0.000s";
    isWaiting = true;
    let delay=0;
    lights.forEach((l,i)=>{
        setTimeout(()=> { if(isWaiting) l.classList.add("on") }, delay+=700);
    });

    setTimeout(()=>{
        if(!isWaiting) return;
        lights.forEach(l=>l.classList.remove("on"));
        lights.forEach(l=>l.classList.add("go"));
        reactionStart=performance.now();
        reactionInterval=setInterval(()=>{
            rTimer.innerText=((performance.now()-reactionStart)/1000).toFixed(3)+"s";
        },10);

        const endReaction = ()=>{
            clearInterval(reactionInterval);
            isWaiting = false;
            window.removeEventListener('mousedown', endReaction);
            window.removeEventListener('touchstart', endReaction);
        };
        window.addEventListener('mousedown', endReaction);
        window.addEventListener('touchstart', endReaction);
    }, delay + 500 + Math.random()*2000);
}

/* THREE.JS BACKGROUND */
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer({canvas:bg, antialias: true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
camera.position.z=8;

let rings=[];
for(let i=0;i<6;i++){
    let geo=new THREE.TorusGeometry(2+i*0.5, 0.03, 16, 100);
    let mat=new THREE.MeshBasicMaterial({color:0x00ffff, wireframe:true});
    let mesh=new THREE.Mesh(geo,mat);
    scene.add(mesh);
    rings.push(mesh);
}

function animate(){
    requestAnimationFrame(animate);
    rings.forEach((r,i)=>{
        r.rotation.x+=0.002+i*0.001;
        r.rotation.y+=0.003+i*0.001;
    });
    renderer.render(scene,camera);
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Default game
openGame('tic');
</script>

</body>
</html>
